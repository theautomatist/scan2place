name: Build standalone binaries

# On a v*.*.* tag, build a single-file executable for each OS with PyInstaller
# and attach them to a GitHub Release — so scan2place also runs without Docker.
# workflow_dispatch builds the binaries as artifacts only (no release).

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: scan2place-windows-x86_64.exe
            bin: dist/scan2place.exe
          - os: ubuntu-latest
            asset: scan2place-linux-x86_64
            bin: dist/scan2place
          - os: macos-latest      # Apple Silicon
            asset: scan2place-macos-arm64
            bin: dist/scan2place
          # Intel macOS (macos-13) is intentionally omitted: GitHub's Intel
          # runners are being retired and queue for a very long time. Intel-Mac
          # users can run via Docker or build from source (pyinstaller scan2place.spec).
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller --clean --noconfirm scan2place.spec

      - name: Name the binary per platform
        shell: bash
        run: |
          chmod +x "${{ matrix.bin }}" || true
          cp "${{ matrix.bin }}" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
